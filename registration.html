<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Survivalists - Register</title>
    <script src="https://kit.fontawesome.com/97b09ccc5f.js" crossorigin="anonymous"></script>

    
    <style>
        /* I picked this font but we can change it later on */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap');
        
        body {
            /* I picked this color because I thought it looked cool, but we can change it. */
            background-color: #FDF5DF; 
            font-family: 'Playfair Display', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* This is the main container for the login */
        .card {
            background: white;
            display: flex;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 5px 5px 10px #5EBEC4; /* this gives the shiny effect on the right side */
            align-items: center;
            gap: 60px;
        }
        
        /* This is for the right side */
        /* tweaked for centering icon */
        .form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .form h2 {
            font-weight: normal;
            margin-bottom: 0px;
            font-size: 26px;
            text-align: center;
        }

        .form h6 {
            font-weight: normal;
            margin-top: 10px;
            font-size: 13px;
            text-align: center;
        }

        .input {
            margin-bottom: 18px;
        }

        .labels {
            display: block;
            font-size: 15px;
            color: #000000;
            margin-bottom: 5px;
        }

        .field-style {
            width: 240px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background: #fcfcfc;
            font-size: 12px;
        }

        .registerButton {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }

        .registerButton:hover {
            background: #F92C85;
        }

        .fa-music {
            font-size: 50px;
            color: #F92C85;
            
        }

        .signup {
            text-decoration: none;
        }

        p {
            color: #5EBEC4;
        }
    </style>
</head>
<body>

    <div class="card">
       
        <div class="form">
            <i class="fa-solid fa-music"></i>
            <h2>Welcome to <strong>SocialTune</strong>!</h2>
            <h6>What are <em>you</em> listening to?</h6>
            <form method="post" action="registrationRequest.php">
                <div class="input">
                    <span class="labels">New Username</span>
                    <input type="text" name="username" class="field-style" placeholder="Please type your new username" required>
                </div>

                <div class="input-box">
                    <span class="labels">New Password</span>
                    <input type="password" name="password" class="field-style" placeholder="Please type your new password" required>
                </div>

                <input type="submit" value="Register" class="registerButton">
            </form>
                        <p>Already have an account? <a href="login.html" class="signup">Login</a><p>
        </div>
    </div>

</body>
</html>
